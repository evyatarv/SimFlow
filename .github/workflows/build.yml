name: SIM-FLOW FW Build CI

# Control when the workflow runs
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # Define the ESP-IDF version and target chips you want to build for
        idf_ver: ["release-v5.4"]
        idf_target: ["esp32", "esp32s3"]

    # Use the official Espressif Docker image
    container: espressif/idf:${{ matrix.idf_ver }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Required if you use git submodules for components

      - name: Set up Build Directory
        run: |
          # Clean build directory if it exists to ensure a fresh build
          rm -rf build

      - name: Build Project
        shell: bash
        run: |
          # Source the IDF environment (already installed in the container)
          . $IDF_PATH/export.sh
          
          # Set the target chip
          idf.py set-target ${{ matrix.idf_target }}
          
          # Run the build
          idf.py build

      - name: Merge Binaries for QEMU
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          
          # In ESP-IDF v5.4, the idf.py merge-bin command uses:
          # --fill-flash-size to pad the output to a specific size
          # --flash-offset to specify the starting address (usually 0x0)
          idf.py merge-bin --output merged_qemu.bin --fill-flash-size 4MB

      - name: Upload QEMU Image
        uses: actions/upload-artifact@v4
        with:
          # This name will be used by the test workflow to download the binary
          name: qemu-binary-${{ matrix.idf_target }}
          path: merged_qemu.bin
          retention-days: 1

      - name: Upload Standard Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.idf_target }}-${{ github.sha }}
          path: |
            build/*.bin
            build/partition_table/partition-table.bin
            build/bootloader/bootloader.bin
            build/*.elf
            build/sdkconfig
          retention-days: 7