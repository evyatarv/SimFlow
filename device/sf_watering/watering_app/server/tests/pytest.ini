[pytest]
# Pytest configuration for SF Watering tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    integration: Integration tests requiring MQTT broker (deselect with '-m "not integration"')
    unit: Unit tests using mocks (run with '-m unit')
    slow: Tests that take longer to run

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Timeout for tests (in seconds)
timeout = 30
