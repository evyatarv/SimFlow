services:
  # 1. The MQTT Broker
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      # Updated to match the provided filename
      - ./mqtt_password_file:/mosquitto/config/mqtt_password_file
    networks:
      - ci-net

  # 2. The Firmware (QEMU Emulation)
  esp32-emulated:
    image: espressif/idf:release-v5.4
    depends_on:
      - mqtt-broker
    volumes:
      - ./device_bin:/app
    networks:
      - ci-net
    environment:
      - TARGET_CHIP=${TARGET_CHIP:-esp32}
    command: >
      qemu-system-xtensa -nographic 
      -machine ${TARGET_CHIP:-esp32}
      -drive file=/app/merged_qemu.bin,if=mtd,format=raw 
      -net nic,model=open_eth 
      -net user

  # 3. The Python Test Runner
  test-runner:
    build:
      context: ..
      # Updated path to match your actual directory structure
      dockerfile: device/sf_watering/watering_app/server/tests/Dockerfile.test
    depends_on:
      - mqtt-broker
      - esp32-emulated
    networks:
      - ci-net
    environment:
      - MQTT_HOST=mqtt-broker

networks:
  ci-net:
    driver: bridge